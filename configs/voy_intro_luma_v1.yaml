seed: 42

paths:
    dataset_dir: datasets/synthetic_voy_intro_luma_v1
    output_dir: experiments/voy_intro_luma_v1

data:
    dataset_mode: online
    source_dirs:
        - datasets/voy_intro_progressive_png
    field_order: tff
    window_frames: 7
    height: 0
    width: 0
    crop_height: 384
    crop_width: 640
    crop_modulo: 4
    num_workers: auto
    train_samples_pct: 90
    val_samples_pct: 10
    dataset_repeats: 1
    source_cache_mode: lru
    source_cache_size: 256
    resample_train_each_epoch: true
    augmentations:
        noise:
            chance: 1.0
            std_range: [2.0, 2.0]
        underexposure:
            chance: 0.0
            factor_range: [0.55, 0.90]
    mixed_cadence:
        chance: 0.0
        boundary_cells: 1
    class_distribution:
        film_phase_0: 0.13
        film_phase_1: 0.13
        film_phase_2: 0.13
        film_phase_3: 0.13
        film_phase_4: 0.13
        video: 0.15
        blend: 0.08
        unknown: 0.06

model:
    base_channels: 24
    channel_mult: [1, 2, 4, 4]
    dropout: 0.1

training:
    batch_size: 8
    epochs: 24
    num_workers: 8
    learning_rate: 0.0003
    weight_decay: 0.01
    amp: true
    device: cuda
    print_freq: 100

inference:
    batch_size: 8
    device: cuda
    field_order: tff
    window_frames: 7
    num_workers: 4
    prefetch_factor: 2
