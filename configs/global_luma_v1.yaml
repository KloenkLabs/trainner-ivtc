seed: 1234

paths:
    dataset_dir: datasets/synthetic_global_luma_v1
    output_dir: experiments/global_luma_v1

data:
    dataset_mode: online
    source_dirs:
        - datasets/gt_test1
    field_order: tff
    window_frames: 11
    height: 0
    width: 0
    crop_height: 0
    crop_width: 0
    crop_modulo: 2
    num_workers: auto
    train_samples_pct: 90
    val_samples_pct: 10
    dataset_repeats: 1
    source_cache_size: 256
    resample_train_each_epoch: true
    noise_std: 2.0
    class_distribution:
        film_phase_0: 0.13
        film_phase_1: 0.13
        film_phase_2: 0.13
        film_phase_3: 0.13
        film_phase_4: 0.13
        video: 0.15
        blend: 0.08
        scene_cut: 0.06
        unknown: 0.06

model:
    base_channels: 32
    channel_mult: [1, 2, 4, 4]
    dropout: 0.1

training:
    batch_size: 64
    epochs: 8
    num_workers: 8
    learning_rate: 0.0003
    weight_decay: 0.01
    amp: true
    device: cuda
    print_freq: 25

inference:
    batch_size: 16
    device: cuda
    field_order: tff
    window_frames: 11
